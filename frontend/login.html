<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clustra — Sign In</title>
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <main class="login_page">
        <h2> Sign in to Clustra</h2>
        <p class="subtitle">Enter your credentials to continue</p>

        <form id="login_form" class="login_form">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <a href="/forgot_password.html" class="forgot-link">Forgot Password?</a>
            <button type="submit">Login</button>
        <a href="/signup.html" class="signup-link">Don't have an account yet? <span>Sign Up</span></a>
        </form>
    </main>
    <script src="/static/js/login.js"></script>
</body>
</html>
